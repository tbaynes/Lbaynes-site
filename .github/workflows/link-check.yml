name: Link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  linkcheck:
    name: Check for broken links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  # re-enable after package-lock.json is committed

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build site
        run: npm run build

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config ./lychee.toml ./dist/**/*.html"
          fail: false
          output: ./lychee-report.md

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: ./lychee-report.md
          retention-days: 30

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0 && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link check found broken links"
          content-filepath: ./lychee-report.md
          labels: |
            bug
            link-rot
            automated
